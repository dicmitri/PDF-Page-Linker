<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Link History</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="popup-header">
      <h1>Page links</h1>
    </header>
    <main>
      <div id="emptyState" class="empty-state" hidden>No copied PDF page links yet.</div>
      <ol id="historyList" class="history-list" aria-label="Copied PDF page links"></ol>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
